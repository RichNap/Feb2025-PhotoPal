
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoPal</title>
  <link rel="manifest" href="./manifest.json">
  
  <script>
    window.process = { env: { TF_CPP_MIN_LOG_LEVEL: '3' } };
    window.ENV = window.ENV || {};
    window.ENV['IS_TEST'] = true; 
    window.ENV['DEBUG'] = false;
    
    window.dispatchSystemLog = (msg) => {
        window.dispatchEvent(new CustomEvent('photopal-system-log', { detail: msg }));
    };
  </script>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="" defer></script>

  <style>
    body {
      margin: 0;
      background-color: #0b0f19;
      color: #f1f5f9;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #root { width: 100vw; height: 100vh; }
    .boot-loader {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0b0f19;
    }
    .boot-rail {
      width: 240px; height: 2px; background: rgba(99, 102, 241, 0.1);
      border-radius: 4px; overflow: hidden; margin-bottom: 24px;
    }
    .boot-bar {
      height: 100%; width: 60%; background: #6366f1;
      box-shadow: 0 0 20px #6366f1;
      animation: boot-slide 1.2s infinite ease-in-out;
    }
    @keyframes boot-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
  </style>

  <!-- Physical Model Shards -->
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/exifr.iife.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js" defer></script>
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" defer></script>
</head>
<body>
  <div id="root">
    <div class="boot-loader">
      <div class="boot-rail"><div class="boot-bar"></div></div>
      <p style="font-size: 10px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; color: #6366f1;">Initializing PhotoPal Engine...</p>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
